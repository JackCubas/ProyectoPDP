<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Firma Segura APP</title>
</head>
<body>
    <h1>Nuevo documento</h1>
    <div class="create-blog content">
        <form accept-charset="utf-8" enctype="multipart/form-data">
            <div class="formgroup container-fluid">
                <label for="name">Nombre del documento</label>
                <input id="name" type="text" name="name" maxlength="50" required/>
            </div>
            <p>
                Selecciona un archivo PDF.
            </p>
            <input type="file" id="file" />
        </form>

        <div id="button-container"></div>
    </div>

<script src="create.js"></script>
</body>
</html>
