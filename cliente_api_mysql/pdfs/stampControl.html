<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma Segura APP</title>
</head>
<body>
    <h1>
        Gestión de estampados de documentos.
    </h1>

    <main id="main-container">
        <!-- main page content -->
    </main>

    <div hidden id="loader"><h1 class="loader-text">Cargando...</h1></div>

    <form hidden id="stampSelect" onsubmit="createStamp()" method="POST" accept-charset="utf-8" enctype="multipart/form-data">
        <p>
        Selecciona una imagen JPG o PNG:
        </p>
        <input type="file" id="file" />
    </form>

    <button id="createStamp" onclick=createStamp()>Crear estampado</button>
    <button id="deleteStamp" onclick=deleteStamp()>Eliminar estampado</button>

    <button onclick="location.href='table.html?page=1'" type="button">Cancelar</button>
<script src="stampControl.js"></script>
</body>
</html>
