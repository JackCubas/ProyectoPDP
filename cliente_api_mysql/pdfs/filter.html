<html lang="es-ES">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/style.css">
        <title>PDP</title>
    </head>
    <body>
        <h1>
            Filtra los documentos por los criterios que necesites.
        </h1>
        <div class="create-blog content">
            <form id="form" onsubmit="sendData()">
                <!-- action="/moviesCreate" method="POST"  -->
                <lable for="emailUser">Correo electrónico:</lable>
                <input type="text" id="emailUser" name="emailUser">
                <lable for="nameUser">Nombre de usuario:</lable>
                <input type="text" id="nameUser" name="nameUser">
                <lable for="docName">Nombre del documento:</lable>
                <input type="text" id="docName" name="docName">
                <lable for="estado">Estado:</lable>
                <input type="text" id="estado" name="estado">
                <button>Filtrar</button>
            </form>
            <button onclick="location.href='table.html?page=1'" type="button">Cancelar</button>
        </div>

        <main id="main-container">
            
        </main>

        <table id="mytable">
            <thead>
            <tr><th>Nombre del documento</th><th>Nombre de usuario</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <script src="filter.js"></script>

      <script src='../modal.js'></script>
</body>
</html>
