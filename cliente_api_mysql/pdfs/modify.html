<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Firma Segura APP</title>
</head>
<body>
    <h1>Editar documento</h1>

    <div class="create-blog content">
        <form accept-charset="utf-8" enctype="multipart/form-data">
            <div class="formgroup container-fluid">
                <label for="name">Nombre del documento</label>
                <input id="name" type="text" name="name" maxlength="50" required/>
            </div>

            <div class="formgroup container-fluid">
                <label for="docEstado">Estado del documento</label>
                <select id="docEstado" name="docEstado">
                    <option value="VALIDATED">Validado</option>
                    <option value="PENDING">Pendiente</option>
                    <option value="REJECTED">Rechazado</option>
                </select>
            </div>

            <p>
                Si necesitas reemplazar el archivo, selecciona un nuevo PDF.
            </p>
            <input type="file" id="file" />
        </form>

        <div id="button-container"></div>
    </div>
<script src="modify.js"></script>
  <script src='../modal.js'></script>
</body>
</html>
