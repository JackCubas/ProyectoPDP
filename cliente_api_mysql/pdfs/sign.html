<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma del documento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.16.0/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="../css/sign.css">
</head>
<body>
    <main id="main-container">
    
    </main>

    <hr>
    <div id="signature-body">
        <div class="signature-container">
            <canvas id="signature-pad" width="400" height="200"></canvas>
            <div class="controls">
                <select id="stroke-style">
                    <option value="pen">Bolígrafo</option>
                    <option value="brush">Pincel</option>
                </select>

                <button id="clear">Limpiar</button>
                <button id="export-png">Exportar como PNG</button>
                <button id="export-jpeg">Exportar como JPEG</button>
            </div>
        </div>
    </div>

    <hr>

    <div id="button-container">
        <button id="savePDF" onclick="saveSignatureAndInsertIntoPDF()">Guardar firma e insertarla en el PDF</button>
        <button id="saveServer" onclick="saveToServer()">Guardar en el servidor</button>
        <button id="delete" onclick="deleteDocument()">Eliminar</button>   
    </div>
    
    <script src="sign.js"></script>
  <script src='../modal.js'></script>
</body>
</html>
